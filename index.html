<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mixbox Palette</title>
    <style>
        body { margin: 0; background: #2b2b2b; }
    </style>
</head>
<body>
<script>
const SOURCES = [
    "https://mixbox-palette.pages.dev/",
    "https://food211.github.io/Mixbox-Palette/"
];

const PROBE_FILE = "js/updater.js";
const TIMEOUT_MS = 4000;

async function race() {
    // 透传 URL 参数（如 ?host=1.0.4）到 app.html
    const params = new URLSearchParams(window.location.search);
    const suffix = params.toString() ? '?' + params.toString() : '';

    try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), TIMEOUT_MS);

        const fastest = await Promise.any(
            SOURCES.map((base, i) =>
                fetch(base + PROBE_FILE, { cache: 'no-store', signal: controller.signal })
                    .then(r => {
                        if (!r.ok) throw new Error(r.status);
                        return i;
                    })
            )
        );

        clearTimeout(timeout);
        window.location.replace(SOURCES[fastest] + "app.html" + suffix);
    } catch (e) {
        // All failed, fallback to first source
        window.location.replace(SOURCES[0] + "app.html" + suffix);
    }
}

race();
</script>
</body>
</html>
