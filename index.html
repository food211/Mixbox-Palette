<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mixbox Palette</title>
    <style>
        body { 
            margin: 0; 
            background: #2b2b2b; 
            color: #f0f0f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        .loader-container {
            width: 80%;
            max-width: 400px;
            text-align: center;
        }
        
        h1 {
            margin-bottom: 30px;
            font-size: 24px;
        }
        
        .loading-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        .progress-container {
            width: 100%;
            height: 4px;
            background: #404040;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4a9eff, #7b68ee);
            border-radius: 2px;
            transition: width 0.3s ease;
        }
        
        .status-text {
            font-size: 14px;
            color: #aaa;
            margin-top: 10px;
            min-height: 20px;
        }
        
        .error-message {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 16px;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .retry-btn {
            margin-top: 12px;
            padding: 8px 20px;
            background: #4a9eff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            display: none;
        }
        
        .retry-btn.show {
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="loading-icon">🎨</div>
        <h1>Mixbox Palette</h1>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="status-text" id="statusText"></div>
        <div class="error-message" id="errorMessage"></div>
        <button class="retry-btn" id="retryBtn"></button>
    </div>

<script>
// 简单语言检测（跟随系统，中文系统用中文，其他用英文）
const _isZh = (navigator.language || '').toLowerCase().startsWith('zh');
const T = {
    detecting:     _isZh ? '检测最快的服务器...'         : 'Detecting fastest server...',
    loadingEngine: _isZh ? '加载引擎文件...'              : 'Loading engine files...',
    loadingFile:   _isZh ? '加载中: '                     : 'Loading: ',
    loadDone:      _isZh ? '加载完成，准备启动应用...'    : 'Load complete, starting app...',
    launching:     _isZh ? '启动应用...'                  : 'Launching app...',
    selectedServer:_isZh ? '已选择最快的服务器: '         : 'Selected fastest server: ',
    fallback:      _isZh ? '无法连接到服务器，使用默认源' : 'Cannot reach server, using default source',
    errorLoad:     _isZh ? '加载失败，请检查网络连接。'   : 'Load failed. Please check your network connection.',
    errorPartial:  _isZh ? '部分核心文件加载失败，请检查网络连接后重试。' : 'Some core files failed to load. Please check your network and retry.',
    errorConnect:  _isZh ? '无法连接到服务器，请检查网络连接后重试。'     : 'Cannot connect to server. Please check your network and retry.',
    retrying:      _isZh ? '重新连接...'                  : 'Reconnecting...',
    retry:         _isZh ? '重试'                         : 'Retry',
};

document.getElementById('statusText').textContent  = T.detecting;
document.getElementById('errorMessage').textContent = T.errorLoad;
document.getElementById('retryBtn').textContent     = T.retry;

const SOURCES = [
    "https://mixbox-palette.pages.dev/",
    "https://food211.github.io/Mixbox-Palette/"
];

const PROBE_FILE = "js/updater.js";
const TIMEOUT_MS = 4000;

// 核心文件列表 - 这些文件会在跳转前预加载
const CORE_FILES = [
    "js/i18n.js",
    "js/mixbox.js",
    "js/base-painter.js",
    "js/heatmap.js",
    "js/mixbox-painter.js",
    "js/km-lut-data.js",
    "js/km-painter.js",
    "js/brush-manager.js",
    "js/palette-storage.js",
    "js/ps-bridge.js",
    "js/app.js",
    "js/updater.js",
    "js/announcer.js"
];

// 更新进度条
function updateProgress(percent, message) {
    document.getElementById('progressBar').style.width = `${percent}%`;
    if (message) {
        document.getElementById('statusText').textContent = message;
    }
}

// 显示错误信息
function showError(message) {
    document.getElementById('errorMessage').textContent = message;
    document.getElementById('errorMessage').classList.add('show');
    document.getElementById('retryBtn').classList.add('show');
}


// 预加载文件
async function preloadFiles(baseUrl) {
    // 确定需要加载的引擎文件
    let filesToLoad = [...CORE_FILES];
    
    updateProgress(10, T.loadingEngine);
    
    const totalFiles = filesToLoad.length;
    let loadedFiles = 0;
    let failedFiles = 0;
    
    // 并行加载所有文件
    const promises = filesToLoad.map(file => {
        return fetch(baseUrl + file, { cache: 'no-store' })
            .then(response => {
                if (!response.ok) throw new Error(`Failed to load ${file}`);
                return response.blob(); // 预加载文件内容
            })
            .then(() => {
                loadedFiles++;
                const percent = 10 + Math.floor(loadedFiles / totalFiles * 85);
                updateProgress(percent, T.loadingFile + file.split('/').pop());
            })
            .catch(err => {
                console.error(`Failed to preload ${file}:`, err);
                failedFiles++;
                // 如果失败文件不多，继续尝试
                if (failedFiles <= 2) {
                    return Promise.resolve(); // 不中断整体加载
                } else {
                    return Promise.reject(new Error('Too many files failed to load'));
                }
            });
    });
    
    try {
        await Promise.all(promises);
        updateProgress(95, T.loadDone);
        return true;
    } catch (error) {
        console.error("预加载文件失败:", error);
        showError(T.errorPartial);
        return false;
    }
}

async function race() {
    // 透传 URL 参数（如 ?host=1.0.4）到 app.html
    const params = new URLSearchParams(window.location.search);
    const suffix = params.toString() ? '?' + params.toString() : '';

    try {
        updateProgress(0, T.detecting);
        
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), TIMEOUT_MS);

        const fastest = await Promise.any(
            SOURCES.map((base, i) =>
                fetch(base + PROBE_FILE, { cache: 'no-store', signal: controller.signal })
                    .then(r => {
                        if (!r.ok) throw new Error(r.status);
                        return i;
                    })
            )
        );

        clearTimeout(timeout);
        const baseUrl = SOURCES[fastest];
        updateProgress(5, T.selectedServer + baseUrl.replace(/https:\/\/|\/$/g, ''));
        
        // 预加载核心文件
        const preloadSuccess = await preloadFiles(baseUrl);
        
        if (preloadSuccess) {
            // 给用户一点时间看到100%
            setTimeout(() => {
                updateProgress(100, T.launching);
                // 跳转到应用页面
                window.location.replace(baseUrl + "app.html" + suffix);
            }, 500);
        }
    } catch (e) {
        console.error("服务器检测失败:", e);
        updateProgress(5, T.fallback);
        
        // 尝试使用第一个源进行预加载
        try {
            const preloadSuccess = await preloadFiles(SOURCES[0]);
            if (preloadSuccess) {
                setTimeout(() => {
                    window.location.replace(SOURCES[0] + "app.html" + suffix);
                }, 500);
            }
        } catch (err) {
            showError(T.errorConnect);
        }
    }
}

// 初始化
race();

// 重试按钮事件监听
document.getElementById('retryBtn').addEventListener('click', () => {
    document.getElementById('errorMessage').classList.remove('show');
    document.getElementById('retryBtn').classList.remove('show');
    updateProgress(0, T.retrying);
    race();
});
</script>
</body>
</html>
