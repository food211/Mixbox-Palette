  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a1a; color: #ddd; font-family: sans-serif; padding: 20px; }
  h1 { font-size: 16px; margin-bottom: 16px; color: #fff; }

  .controls {
    display: flex; align-items: center; gap: 20px;
    background: #2a2a2a; padding: 12px 16px; border-radius: 6px;
    margin-bottom: 20px; flex-wrap: wrap;
  }
  .controls label { font-size: 13px; display: flex; align-items: center; gap: 8px; }
  .controls input[type=color] { width: 48px; height: 32px; border: none; cursor: pointer; border-radius: 4px; }
  .controls input[type=range] { width: 100px; }

  .grid {
    display: grid;
    grid-template-columns: max-content 1fr 1fr 1fr 1fr 1fr;
    gap: 2px;
  }
  .grid-header {
    display: contents;
  }
  .grid-header > div {
    text-align: center; font-size: 12px; padding: 6px 4px;
    background: #2a2a2a; border-radius: 4px 4px 0 0; color: #aaa;
  }
  .grid-header > div:first-child { background: transparent; }

  .row { display: contents; }
  .row-label {
    display: flex; align-items: center;
    font-size: 11px; color: #888; padding-right: 8px;
    white-space: nowrap;
  }
  .cell { background: #111; }
  canvas { display: block; width: 100%; height: 40px; }

  .section-gap { height: 12px; grid-column: 1 / -1; }

  .note { font-size: 11px; color: #666; margin-top: 16px; }
  .badge {
    display: inline-block; font-size: 10px; padding: 2px 6px;
    border-radius: 3px; margin-left: 4px; vertical-align: middle;
  }
.badge-direct { background: #3a2a1a; color: #bb8844; }
  .badge-linear { background: #2a2a3a; color: #6688bb; }
  .badge-mixbox { background: #3a1a3a; color: #bb66bb; }
  .badge-lite { background: #1a3a3a; color: #44bbbb; }

// ============ 混色算法 ============

function linearMix(r1, g1, b1, r2, g2, b2, t) {
  return [r1 + (r2 - r1) * t, g1 + (g2 - g1) * t, b1 + (b2 - b1) * t];
}

function kmMixDirect(r1, g1, b1, r2, g2, b2, t) {
  function geoMix(a, b, t) {
    a = Math.max(0.001, Math.min(0.999, a));
    b = Math.max(0.001, Math.min(0.999, b));
    return Math.pow(a, 1 - t) * Math.pow(b, t);
  }
  return [geoMix(r1, r2, t), geoMix(g1, g2, t), geoMix(b1, b2, t)];
}

function drawGradient(canvasEl, r1, g1, b1, r2, g2, b2, mixFn) {
  const w = canvasEl.width = canvasEl.offsetWidth || 300;
  const h = canvasEl.height = 40;
  const ctx = canvasEl.getContext('2d');
  const img = ctx.createImageData(w, h);

  for (let x = 0; x < w; x++) {
    const t = x / (w - 1);
    let rgb;
    if (mixFn === 'linear') rgb = linearMix(r1, g1, b1, r2, g2, b2, t);
    else if (mixFn === 'direct') rgb = kmMixDirect(r1, g1, b1, r2, g2, b2, t);
    else if (mixFn === 'fix') rgb = kmMixFix(r1, g1, b1, r2, g2, b2, t);
    else if (mixFn === 'mixbox') rgb = mixboxMix(r1, g1, b1, r2, g2, b2, t);
    else if (mixFn === 'spectral') rgb = spectralMix(r1, g1, b1, r2, g2, b2, t);

    const r = Math.round(Math.max(0, Math.min(1, rgb[0])) * 255);
    const g = Math.round(Math.max(0, Math.min(1, rgb[1])) * 255);
    const b = Math.round(Math.max(0, Math.min(1, rgb[2])) * 255);

    for (let y = 0; y < h; y++) {
      const idx = (y * w + x) * 4;
      img.data[idx]     = r;
      img.data[idx + 1] = g;
      img.data[idx + 2] = b;
      img.data[idx + 3] = 255;
    }
  }
  ctx.putImageData(img, 0, 0);
}

function hexToRGB01(hex) {
  return [parseInt(hex.slice(1,3),16)/255, parseInt(hex.slice(3,5),16)/255, parseInt(hex.slice(5,7),16)/255];

// sRGB -> linear -> Lab 近似 (for ΔE)
function toLab(r, g, b) {
  const lin = v => v > 0.04045 ? Math.pow((v+0.055)/1.055, 2.4) : v/12.92;
  let X = lin(r)*0.4124564 + lin(g)*0.3575761 + lin(b)*0.1804375;
  let Y = lin(r)*0.2126729 + lin(g)*0.7151522 + lin(b)*0.0721750;
  let Z = lin(r)*0.0193339 + lin(g)*0.1191920 + lin(b)*0.9503041;
  X/=0.95047; Z/=1.08883;
  const f = t => t > 0.008856 ? Math.cbrt(t) : 7.787*t+16/116;
  return [116*f(Y)-16, 500*(f(X)-f(Y)), 200*(f(Y)-f(Z))];
}

function dE(r1,g1,b1,r2,g2,b2) {
  const [L1,a1,b1_]=toLab(r1,g1,b1), [L2,a2,b2_]=toLab(r2,g2,b2);
  return Math.sqrt((L1-L2)**2+(a1-a2)**2+(b1_-b2_)**2);
}

function generateComparisonReport() {
  // 定义混色算法
  const mixers = {
    'Linear RGB': linearMix,
    'KM Direct': kmMixDirect,
    'KM Lite': kmMixFix,
    'Mixbox': mixboxMix,
    'Spectral': spectralMix
  };
  
  const ts = [0.25, 0.5, 0.75]; // 混合比例
  
  // 存储所有结果
  const results = [];
  const comparisons = {};
 
  // 对每对颜色进行测试
  for (const pair of testPairs) {
    const [r1, g1, b1] = hexToRGB01(pair.a);
    const [r2, g2, b2] = hexToRGB01(pair.b);
    
    for (const t of ts) {
      const caseId = `${pair.id} (t=${t})`;
      const mixResults = {};
      
      // 计算每种混合算法的结果
      for (const [mixerName, mixerFn] of Object.entries(mixers)) {
        const [r, g, b] = mixerFn(r1, g1, b1, r2, g2, b2, t);
        mixResults[mixerName] = {
          rgb: [r, g, b],
          rgbStr: `rgb(${Math.round(r*255)},${Math.round(g*255)},${Math.round(b*255)})`
        };
      }
      
      // 添加到结果中
      results.push({
        case: caseId,
        ...Object.fromEntries(Object.entries(mixResults).map(([name, data]) => [name, data.rgbStr]))
      });
      
      // 计算每种算法之间的差异
      for (const [name1, data1] of Object.entries(mixResults)) {
        for (const [name2, data2] of Object.entries(mixResults)) {
          if (name1 >= name2) continue; // 避免重复比较
          
          const [r1, g1, b1] = data1.rgb;
          const [r2, g2, b2] = data2.rgb;
          const de = dE(r1, g1, b1, r2, g2, b2);
          const dr = Math.abs(r1-r2)*255;
          const dg = Math.abs(g1-g2)*255;
          const db = Math.abs(b1-b2)*255;
          
          const compKey = `${name1} vs ${name2}`;
          if (!comparisons[compKey]) {
            comparisons[compKey] = {
              count: 0,
              totalDE: 0,
              maxDE: 0,
              maxCase: '',
              details: []
            };
          }
          
          comparisons[compKey].count++;
          comparisons[compKey].totalDE += de;
          
          if (de > comparisons[compKey].maxDE) {
            comparisons[compKey].maxDE = de;
            comparisons[compKey].maxCase = caseId;
          }
          
          comparisons[compKey].details.push({
            case: caseId,
            dRGB: `Δ(${dr.toFixed(1)},${dg.toFixed(1)},${db.toFixed(1)})`,
            dE: de.toFixed(2)
          });
        }
      }
    }
  }
  
  // 输出结果
  console.log("===== 混色算法对比分析 =====");
  console.log("\n1. 各算法混色结果:");
  console.table(results);
  
  console.log("\n2. 算法间差异统计:");
  for (const [compKey, data] of Object.entries(comparisons)) {
    console.log(`\n${compKey}:`);
    console.log(`平均ΔE: ${(data.totalDE/data.count).toFixed(2)}, 最大ΔE: ${data.maxDE.toFixed(2)} [${data.maxCase}]`);
    console.table(data.details);
  }
  
  console.log("\n3. 自定义颜色混合对比:");
  const hexA = document.getElementById('colorA').value;
  const hexB = document.getElementById('colorB').value;
  const [r1, g1, b1] = hexToRGB01(hexA);
  const [r2, g2, b2] = hexToRGB01(hexB);
  
  const customResults = [];
  for (const t of [0.25, 0.5, 0.75]) {
    const row = { t: t };
    for (const [mixerName, mixerFn] of Object.entries(mixers)) {
      const [r, g, b] = mixerFn(r1, g1, b1, r2, g2, b2, t);
      row[mixerName] = `rgb(${Math.round(r*255)},${Math.round(g*255)},${Math.round(b*255)})`;
    }
    customResults.push(row);
  }
  console.log(`自定义颜色: ${hexA} + ${hexB}`);
  console.table(customResults);
}
