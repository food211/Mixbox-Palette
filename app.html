      function gtag(){dataLayer.push(arguments);}
      (function(){
        var h = location.hostname;
        if (h === 'localhost' || h === '127.0.0.1' || h === '') return;
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-9C4JZPQVMC';
        document.head.appendChild(s);

    <style>
        /* 启动期间隐藏半成品 UI，显示 loading 覆盖层 */
        body:not(.app-ready) > .container { visibility: hidden; }
        #appLoader {
            position: fixed; inset: 0; z-index: 9999;
            background: #2b2b2b; color: #f0f0f0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            transition: opacity 0.25s ease;
        }
        #appLoader.hidden { opacity: 0; pointer-events: none; }
        #appLoader .icon { font-size: 42px; margin-bottom: 16px; }
        #appLoader .title { font-size: 18px; margin-bottom: 18px; }
        #appLoader .spinner {
            width: 28px; height: 28px; border-radius: 50%;
            border: 3px solid #404040; border-top-color: #4a9eff;
            animation: app-spin 0.9s linear infinite;
        }
        @keyframes app-spin { to { transform: rotate(360deg); } }
    </style>

                    <div class="zoom-option" data-zoom="0.9">90%</div>

<!-- 脚本加载 -->
<script>
    // 创建script标签加载适当的库（同一 src 只加载一次，返回同一 Promise）
    const _loadScriptCache = new Map();
    function loadScript(src) {
        if (_loadScriptCache.has(src)) return _loadScriptCache.get(src);
        const p = new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = src;
            script.onload = () => resolve();
            script.onerror = () => {
                _loadScriptCache.delete(src); // 失败允许重试
                console.error(`Failed to load script: ${src}`);
                reject(new Error(`Failed to load script: ${src}`));
            };
            document.head.appendChild(script);
        });
        _loadScriptCache.set(src, p);
        return p;
    }

    // 供 app.js 在切换到 KM 或启动时按需加载 KM 引擎
    // LUT 数据由 km-painter.js 内部 fetch('assets/km-lut.png') 加载
    window.ensureKMLoaded = async function() {
        await loadScript('js/km-painter.js');
    };

    // 供 app.js 在切换到 MB 或启动时按需加载 Mixbox 引擎
    window.ensureMBLoaded = async function() {
        await loadScript('js/mixbox.js');
        await loadScript('js/mixbox-painter.js');
    };
    
    // 检测WebGL支持
    function isWebGLSupported() {
        try {
            const canvas = document.createElement('canvas');
            return !!(window.WebGLRenderingContext && 
                (canvas.getContext('webgl') || canvas.getContext('experimental-webgl')));
        } catch(e) {
            return false;
        }
    }
    
    // 初始化应用
    async function loadAppScripts() {
        try {
            // 等待 SW 就绪，确保后续资源请求都能被缓存拦截
            if ('serviceWorker' in navigator && location.protocol !== 'file:') {
                await navigator.serviceWorker.ready;
                console.log('✅ Service Worker 就绪');
            }

            if (!isWebGLSupported()) {
                alert('您的浏览器不支持 WebGL，无法运行本应用。');
                return;
            }

            // 判断启动引擎：若用户上次用的是 KM，首帧就需要 KM
            const savedEngine = localStorage.getItem('mixbox_engine') || 'km';

            // 前置：i18n 必须在所有其他脚本之前就绪，否则后续脚本顶层代码读取 I18N 会拿到未初始化状态
            await Promise.all([
                loadScript('js/i18n-translations.js'),
                loadScript('js/i18n.js'),
            ]);
            I18N.init();
            console.log('✅ i18n 就绪:', I18N.getLang());

            // Tier 0：无依赖的脚本全部并行下载
            const tier0 = Promise.all([
                loadScript('js/params.js'),
                loadScript('js/device-profile.js'),
                loadScript('js/frame-scheduler.js'),
                loadScript('js/base-painter.js'),
                loadScript('js/brush-manager.js'),
                loadScript('js/palette-storage.js'),
                loadScript('js/ps-bridge.js'),
                loadScript('js/palette-presets.js'),
                loadScript('js/zoom.js'),
            ]);

            // Tier 1：依赖 base-painter.js（class 定义 / prototype 挂载）
            await loadScript('js/base-painter.js'); // dedupe 命中，仅等 tier0 中的同一份
            const tier1 = Promise.all([
                loadScript('js/heatmap.js'),
                loadScript('js/wetpaper.js'),
            ]);

            // updater / announcer 不依赖其他脚本，此时就发起下载（不 await，让请求尽早排队）
            const auxPromise = Promise.all([
                loadScript('js/updater.js'),
                loadScript('js/announcer.js'),
            ]);

            // 启动引擎按需加载；非启动引擎 idle 时预取（不阻塞首屏）
            let bootEnginePromise = null;
            if (savedEngine === 'mixbox') {
                bootEnginePromise = window.ensureMBLoaded();
                (window.requestIdleCallback || ((cb) => setTimeout(cb, 2000)))(() => {
                    window.ensureKMLoaded().then(() => console.log('✅ KM 引擎已空闲预取'));
                });
            } else {
                bootEnginePromise = window.ensureKMLoaded();
                (window.requestIdleCallback || ((cb) => setTimeout(cb, 2000)))(() => {
                    window.ensureMBLoaded().then(() => console.log('✅ Mixbox 引擎已空闲预取'));
                });
            }

            await tier0;
            await tier1;
            console.log('✅ 核心依赖已加载');

            await bootEnginePromise;
            console.log(`✅ ${savedEngine === 'mixbox' ? 'Mixbox' : 'KM'} 引擎已加载（启动引擎）`);

            // app.js 依赖以上全部
            await loadScript('js/app.js');
            console.log('✅ app.js 已加载');

            // 重要：手动调用 app.js 中的 initApp 函数
            console.log('🚀 正在初始化应用...');
            window.initApp();

            // 揭示主界面，淡出 loading 覆盖层
            document.body.classList.add('app-ready');
            const loader = document.getElementById('appLoader');
            if (loader) {
                loader.classList.add('hidden');
                setTimeout(() => loader.remove(), 300);
            }

            // 辅助模块加载完后再挂版本号 / 公告
            auxPromise.then(() => {
                const versionLabel = document.getElementById('versionLabel');
                if (versionLabel && typeof Updater !== 'undefined') {
                    versionLabel.textContent = Updater.CURRENT_VERSION;
                    versionLabel.title = I18N.t('clickCheckUpdate');
                    versionLabel.addEventListener('click', () => Announcer.checkUpdate());
                }
                // 延迟启动公告组件（包揽更新检测 + 公告推送）
                // 用 requestIdleCallback 让公告初始化在浏览器空闲时执行，
                // 避免抢占首屏资源；不支持的环境兜底到 setTimeout。
                const startAnnouncer = () => Announcer.init();
                if (typeof requestIdleCallback === 'function') {
                    requestIdleCallback(startAnnouncer, { timeout: 3000 });
                } else {
                    setTimeout(startAnnouncer, 3000);
                }
            });

        } catch (error) {
            console.error('初始化失败:', error);
            // 揭示主界面避免卡在 loading，便于用户看到 alert / 错误状态
            document.body.classList.add('app-ready');
            const loader = document.getElementById('appLoader');
            if (loader) loader.remove();
            alert('加载应用程序时出错，请检查控制台获取详细信息。');
        }
    }
    
    // 页面加载完成后加载脚本
    window.addEventListener('DOMContentLoaded', loadAppScripts);

    // 兜底：15 秒仍未 ready 就揭示主界面，避免 loader 卡死
    setTimeout(() => {
        if (!document.body.classList.contains('app-ready')) {
            console.warn('⚠️ 加载超时 15 秒，强制揭示主界面');
            document.body.classList.add('app-ready');
            const loader = document.getElementById('appLoader');
            if (loader) loader.remove();
        }
    }, 15000);

    // 注册 Service Worker（file:// 协议不支持，跳过）
    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then((registration) => {
                    console.log('✅ Service Worker 注册成功:', registration.scope);
                })
                .catch((error) => {
                    console.log('❌ Service Worker 注册失败:', error);
                });
        });
    }
</script>
